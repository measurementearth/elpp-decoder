<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Antelope Server Dashboard</title>
  <style>
    body{font-family:Inter,Segoe UI,Arial,Helvetica,sans-serif;margin:16px;background:#f7f9fb;color:#0b2545}
    h1{font-size:18px;margin:0 0 8px}
    .row{display:flex;gap:12px}
    .card{background:#fff;padding:12px;border-radius:6px;box-shadow:0 1px 3px rgba(16,24,40,0.05);flex:1;min-width:0}
    pre{white-space:pre-wrap;word-break:break-word;max-height:60vh;overflow:auto;background:#0b1220;color:#cbe2ff;padding:12px;border-radius:4px}
    .meta{font-size:12px;color:#556}
    button{padding:6px 10px;border-radius:6px;border:1px solid #d0d7df;background:#fff;cursor:pointer}
    button:disabled{opacity:0.5;cursor:not-allowed}
    button.primary{background:#1a56db;color:#fff;border-color:#1a56db}
    button.primary:hover:not(:disabled){background:#1648c0}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:6px 8px;background:#f0f4f8;border-bottom:2px solid #d0d7df;white-space:nowrap}
    td{padding:5px 8px;border-bottom:1px solid #e8ecf0;vertical-align:top}
    tr:last-child td{border-bottom:none}
    .badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600}
    .badge-ok{background:#d1fae5;color:#065f46}
    .badge-err{background:#fee2e2;color:#991b1b}
    .badge-warn{background:#fef3c7;color:#92400e}
    .chain-header{font-weight:700;font-size:13px;margin:10px 0 4px;color:#0b2545}
    #refreshStatus{font-size:12px;color:#556;margin-left:8px}
  </style>
</head>
<body>
  <h1>Antelope Server Dashboard</h1>
  <div class="meta">View runtime state for <strong>device_states</strong> and <strong>tapos_manager_state</strong>. Auto-refreshes every 2s.</div>
  <div style="height:8px"></div>
  <div class="row">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <strong>device_states</strong>
        <div><button id="refresh">Refresh</button></div>
      </div>
      <pre id="device_states">loading…</pre>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <strong>tapos_manager_state</strong>
        <div id="updatedAt" class="meta"></div>
      </div>
      <pre id="tapos_manager_state">loading…</pre>
    </div>
  </div>

  <div style="height:16px"></div>

  <div class="card" id="serverStatsCard">
    <div style="margin-bottom:8px"><strong>Server Statistics</strong></div>
    <div id="serverStatsContent">loading…</div>
  </div>

  <div style="height:16px"></div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <strong>Dispatch TAPOS to Devices</strong>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <button id="dispatchTaposTestnet" class="primary">⬇ Dispatch TAPOS → TELOS_TESTNET</button>
      <button id="dispatchTaposMainnet" class="primary">⬇ Dispatch TAPOS → TELOS_MAINNET</button>
      <span id="dispatchTaposStatus" style="font-size:12px;color:#556"></span>
    </div>
    <div id="dispatchTaposResult" style="margin-top:8px;font-size:12px"></div>
  </div>

  <div style="height:16px"></div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <strong>Access Point Status</strong>
      <div>
        <button id="refreshAPs" class="primary">⟳ Refresh All APs</button>
        <span id="refreshStatus"></span>
      </div>
    </div>
    <div id="apStatusTable">loading…</div>
  </div>

  <script src="/dashboard/app.js"></script>
</body>
</html>
